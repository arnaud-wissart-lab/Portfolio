name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      image_tag: sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=sha-${{ github.sha }}

      - name: Resolve PUBLIC_URL
        id: public-url
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL || vars.PUBLIC_URL }}
          DOMAIN: ${{ secrets.DOMAIN || vars.DOMAIN }}
        run: |
          if [ -n "${PUBLIC_URL:-}" ]; then
            value="$PUBLIC_URL"
          elif [ -n "${DOMAIN:-}" ]; then
            value="https://${DOMAIN#https://}"
          else
            value="https://arnovissard.fr"
          fi
          value="${value%/}"
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_PUBLIC_URL=${{ steps.public-url.outputs.value }}

  deploy:
    needs: build-and-push
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy target config
        id: deploy-config
        env:
          DEPLOY_HOST_SECRET: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_VAR: ${{ vars.DEPLOY_HOST }}
          SSH_HOST_SECRET: ${{ secrets.SSH_HOST }}
          SSH_HOST_VAR: ${{ vars.SSH_HOST }}
          DEPLOY_USER_SECRET: ${{ secrets.DEPLOY_USER }}
          DEPLOY_USER_VAR: ${{ vars.DEPLOY_USER }}
          SSH_USER_SECRET: ${{ secrets.SSH_USER }}
          SSH_USER_VAR: ${{ vars.SSH_USER }}
          DEPLOY_PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PATH_VAR: ${{ vars.DEPLOY_PATH }}
          SSH_PATH_SECRET: ${{ secrets.SSH_PATH }}
          SSH_PATH_VAR: ${{ vars.SSH_PATH }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PORT_VAR: ${{ vars.DEPLOY_PORT }}
          SSH_PORT_SECRET: ${{ secrets.SSH_PORT }}
          SSH_PORT_VAR: ${{ vars.SSH_PORT }}
          DEPLOY_APP_PORT_SECRET: ${{ secrets.DEPLOY_APP_PORT }}
          DEPLOY_APP_PORT_VAR: ${{ vars.DEPLOY_APP_PORT }}
          APP_PORT_SECRET: ${{ secrets.APP_PORT }}
          APP_PORT_VAR: ${{ vars.APP_PORT }}
          SSH_APP_PORT_SECRET: ${{ secrets.SSH_APP_PORT }}
          SSH_APP_PORT_VAR: ${{ vars.SSH_APP_PORT }}
          DEPLOY_BIND_IP_SECRET: ${{ secrets.DEPLOY_BIND_IP }}
          DEPLOY_BIND_IP_VAR: ${{ vars.DEPLOY_BIND_IP }}
          APP_BIND_IP_SECRET: ${{ secrets.APP_BIND_IP }}
          APP_BIND_IP_VAR: ${{ vars.APP_BIND_IP }}
          SSH_BIND_IP_SECRET: ${{ secrets.SSH_BIND_IP }}
          SSH_BIND_IP_VAR: ${{ vars.SSH_BIND_IP }}
          DEPLOY_SSH_KEY_SECRET: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY_SECRET: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          host="${DEPLOY_HOST_SECRET:-${DEPLOY_HOST_VAR:-${SSH_HOST_SECRET:-${SSH_HOST_VAR:-}}}}"
          user="${DEPLOY_USER_SECRET:-${DEPLOY_USER_VAR:-${SSH_USER_SECRET:-${SSH_USER_VAR:-}}}}"
          path="${DEPLOY_PATH_SECRET:-${DEPLOY_PATH_VAR:-${SSH_PATH_SECRET:-${SSH_PATH_VAR:-}}}}"
          port="${DEPLOY_PORT_SECRET:-${DEPLOY_PORT_VAR:-${SSH_PORT_SECRET:-${SSH_PORT_VAR:-22}}}}"
          app_port="${DEPLOY_APP_PORT_SECRET:-${DEPLOY_APP_PORT_VAR:-${APP_PORT_SECRET:-${APP_PORT_VAR:-${SSH_APP_PORT_SECRET:-${SSH_APP_PORT_VAR:-8080}}}}}}"
          bind_ip="${DEPLOY_BIND_IP_SECRET:-${DEPLOY_BIND_IP_VAR:-${APP_BIND_IP_SECRET:-${APP_BIND_IP_VAR:-${SSH_BIND_IP_SECRET:-${SSH_BIND_IP_VAR:-0.0.0.0}}}}}}"
          key="${DEPLOY_SSH_KEY_SECRET:-${SSH_PRIVATE_KEY_SECRET:-}}"

          if [ -z "${host:-}" ]; then
            echo "::error::Missing host. Set DEPLOY_HOST (or legacy SSH_HOST)."
            exit 1
          fi
          if [ -z "${user:-}" ]; then
            echo "::error::Missing user. Set DEPLOY_USER (or legacy SSH_USER)."
            exit 1
          fi
          if [ -z "${key:-}" ]; then
            echo "::error::Missing SSH key. Set DEPLOY_SSH_KEY (or legacy SSH_PRIVATE_KEY)."
            exit 1
          fi
          if [ -z "${path:-}" ]; then
            path="/home/${user}/apps/portfolio-hub"
          fi

          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "user=$user" >> "$GITHUB_OUTPUT"
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"
          echo "app_port=$app_port" >> "$GITHUB_OUTPUT"
          echo "bind_ip=$bind_ip" >> "$GITHUB_OUTPUT"

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY || secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust remote host key
        env:
          DEPLOY_HOST: ${{ steps.deploy-config.outputs.host }}
          DEPLOY_PORT: ${{ steps.deploy-config.outputs.port }}
        run: |
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Bootstrap remote path and compose (first run)
        env:
          DEPLOY_HOST: ${{ steps.deploy-config.outputs.host }}
          DEPLOY_PORT: ${{ steps.deploy-config.outputs.port }}
          DEPLOY_USER: ${{ steps.deploy-config.outputs.user }}
          DEPLOY_PATH: ${{ steps.deploy-config.outputs.path }}
          APP_PORT: ${{ steps.deploy-config.outputs.app_port }}
          APP_BIND_IP: ${{ steps.deploy-config.outputs.bind_ip }}
          IMAGE_NAME: ${{ needs.build-and-push.outputs.image_name }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' APP_PORT='${APP_PORT}' APP_BIND_IP='${APP_BIND_IP}' IMAGE_NAME='${IMAGE_NAME}' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          mkdir -p "$DEPLOY_PATH"
          compose_file="$DEPLOY_PATH/docker-compose.yml"

          if [ ! -f "$compose_file" ]; then
            cat > "$compose_file" <<EOF
          services:
            portfolio-hub:
              image: ${IMAGE_NAME}:\${IMAGE_TAG:-latest}
              container_name: portfolio-hub
              restart: unless-stopped
              ports:
                - "\${APP_BIND_IP:-0.0.0.0}:\${APP_PORT:-8080}:80"
              healthcheck:
                test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
                interval: 30s
                timeout: 5s
                retries: 3
          EOF
            echo "Created $compose_file"
          else
            echo "Using existing $compose_file"
            # Migrate legacy hardcoded port mappings to APP_PORT variable.
            sed -i \
              -e "s#\"8080:80\"#\"\${APP_BIND_IP:-0.0.0.0}:\${APP_PORT:-8080}:80\"#g" \
              -e "s#'8080:80'#\"\${APP_BIND_IP:-0.0.0.0}:\${APP_PORT:-8080}:80\"#g" \
              -e "s#127.0.0.1:\${APP_PORT:-8080}:80#\${APP_BIND_IP:-0.0.0.0}:\${APP_PORT:-8080}:80#g" \
              -e "s#127.0.0.1:8080:80#\${APP_BIND_IP:-0.0.0.0}:\${APP_PORT:-8080}:80#g" \
              -e "s#- 8080:80#- \"\${APP_BIND_IP:-0.0.0.0}:\${APP_PORT:-8080}:80\"#g" \
              "$compose_file"
          fi
          REMOTE

      - name: Authenticate remote Docker to GHCR
        env:
          DEPLOY_HOST: ${{ steps.deploy-config.outputs.host }}
          DEPLOY_PORT: ${{ steps.deploy-config.outputs.port }}
          DEPLOY_USER: ${{ steps.deploy-config.outputs.user }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GHCR_TOKEN:-}" ]; then
            echo "::error::Missing GHCR token. Set GHCR_TOKEN or rely on GITHUB_TOKEN."
            exit 1
          fi

          printf '%s\n' "$GHCR_TOKEN" | ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin"

      - name: Deploy on remote Docker host
        env:
          DEPLOY_HOST: ${{ steps.deploy-config.outputs.host }}
          DEPLOY_PORT: ${{ steps.deploy-config.outputs.port }}
          DEPLOY_USER: ${{ steps.deploy-config.outputs.user }}
          DEPLOY_PATH: ${{ steps.deploy-config.outputs.path }}
          APP_PORT: ${{ steps.deploy-config.outputs.app_port }}
          APP_BIND_IP: ${{ steps.deploy-config.outputs.bind_ip }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' APP_PORT='${APP_PORT}' APP_BIND_IP='${APP_BIND_IP}' IMAGE_TAG='${IMAGE_TAG}' bash -s" \
            < scripts/deploy-remote.sh
