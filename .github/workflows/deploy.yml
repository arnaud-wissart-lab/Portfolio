name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.name }}
      image_tag: sha-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=sha-${{ github.sha }}

      - name: Resolve PUBLIC_URL
        id: public-url
        env:
          PUBLIC_URL: ${{ secrets.PUBLIC_URL || vars.PUBLIC_URL }}
          DOMAIN: ${{ secrets.DOMAIN || vars.DOMAIN }}
        run: |
          if [ -n "${PUBLIC_URL:-}" ]; then
            value="$PUBLIC_URL"
          elif [ -n "${DOMAIN:-}" ]; then
            value="https://${DOMAIN#https://}"
          else
            value="https://arnovissard.fr"
          fi
          value="${value%/}"
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_PUBLIC_URL=${{ steps.public-url.outputs.value }}

  deploy:
    needs: build-and-push
    runs-on:
      - self-hosted
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy target config
        id: deploy-config
        env:
          DEPLOY_HOST_SECRET: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_VAR: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER_SECRET: ${{ secrets.DEPLOY_USER }}
          DEPLOY_USER_VAR: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH_SECRET: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PATH_VAR: ${{ vars.DEPLOY_PATH }}
          DEPLOY_PORT_SECRET: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PORT_VAR: ${{ vars.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          host="${DEPLOY_HOST_SECRET:-${DEPLOY_HOST_VAR:-}}"
          user="${DEPLOY_USER_SECRET:-${DEPLOY_USER_VAR:-}}"
          path="${DEPLOY_PATH_SECRET:-${DEPLOY_PATH_VAR:-}}"
          port="${DEPLOY_PORT_SECRET:-${DEPLOY_PORT_VAR:-22}}"

          if [ -z "${host:-}" ]; then
            echo "::error::Missing DEPLOY_HOST (set secret DEPLOY_HOST or variable DEPLOY_HOST)."
            exit 1
          fi
          if [ -z "${user:-}" ]; then
            echo "::error::Missing DEPLOY_USER (set secret DEPLOY_USER or variable DEPLOY_USER)."
            exit 1
          fi
          if [ -z "${path:-}" ]; then
            echo "::error::Missing DEPLOY_PATH (set secret DEPLOY_PATH or variable DEPLOY_PATH)."
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::error::Missing required secret DEPLOY_SSH_KEY."
            exit 1
          fi

          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "user=$user" >> "$GITHUB_OUTPUT"
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust remote host key
        env:
          DEPLOY_HOST: ${{ steps.deploy-config.outputs.host }}
          DEPLOY_PORT: ${{ steps.deploy-config.outputs.port }}
        run: |
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on remote Docker host
        env:
          DEPLOY_HOST: ${{ steps.deploy-config.outputs.host }}
          DEPLOY_PORT: ${{ steps.deploy-config.outputs.port }}
          DEPLOY_USER: ${{ steps.deploy-config.outputs.user }}
          DEPLOY_PATH: ${{ steps.deploy-config.outputs.path }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          ssh -p "$DEPLOY_PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' IMAGE_TAG='${IMAGE_TAG}' bash -s" \
            < scripts/deploy-remote.sh
